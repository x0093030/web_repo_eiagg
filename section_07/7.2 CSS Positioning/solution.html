<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    .red-circle {
      width: 200px;
      height: 200px;
      background-color: green;
      border-radius: 50%;
      position: absolute;
      top: 10px;
      left: 300px;
    }
    .blue-box {
      background-color: blue;
      width: 500px;
      height: 300px;
      position: relative;
      top: 10px;
      left: 10px;
    }
    .orange-square {
      width: 100px;
      height: 100px;
      background-color: orange;
      position: relative;
      top: 20px;
      left: 30px;
    }
    .purple-rectangle {
      width: 150px;
      height: 100px;
      background-color: purple;
      position: relative;
      top: 0px;
      left: 60px;
    }
    .blue-triangle {
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 100px solid blue;
      position: relative;
      top: 10px;
      left: 90px;
    }
  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle"></div>
  </div>
  <div class="orange-square"></div>
  <div class="purple-rectangle"></div>
  <div class="blue-triangle"></div>
</body>

</html>
